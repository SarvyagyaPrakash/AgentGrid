version: '3.8'

services:
  cloud_api:
    build:
      context: ./cloud_api
      dockerfile: Dockerfile
    ports:
      - "8333:8333"
    env_file:
      - .env
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8333
    depends_on:
      - cloud_api
    restart: unless-stopped
